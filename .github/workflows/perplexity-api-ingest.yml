name: Perplexity API Ingest

on:
  workflow_dispatch:
  schedule:
    - cron: "23 * * * *" # hourly, UTC

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run ingest
        env:
          PERPLEXITY_API_KEY: ${{ secrets.perplexity_api_key }}
        run: |
          node Agent-Loop/Automation/perplexity-api/ingest.mjs

      - name: Commit outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Perplexity API ingest (auto)" || exit 0
          git push
