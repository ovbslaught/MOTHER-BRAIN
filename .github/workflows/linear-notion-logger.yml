name: Linear + Notion Logger

on:
  push:
    branches: ["*"]
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  log:
    runs-on: ubuntu-latest
    name: Log to Linear and Notion

    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Gather Run Info
        id: info
        run: |
          echo "ts=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT
          echo "run_url=https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $GITHUB_OUTPUT
          echo "branch=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          echo "sha=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Log to Linear
        env:
          LINEAR_TOKEN: ${{ secrets.LINEAR_API_KEY }}
        run: |
          if [ -z "$LINEAR_TOKEN" ]; then
            echo "LINEAR_API_KEY not set - skipping"
            exit 0
          fi
          TEAMS=$(curl -sf -X POST https://api.linear.app/graphql \
            -H "Authorization: $LINEAR_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"query":"{ teams { nodes { id name } } }"}') || { echo "Linear API error"; exit 0; }
          echo "Teams: $TEAMS"
          TEAM_ID=$(echo "$TEAMS" | jq -r ".data.teams.nodes[0].id // empty")
          echo "Team ID: $TEAM_ID"
          if [ -n "$TEAM_ID" ]; then
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            TITLE="[MOTHER-BRAIN] CI: ${{ github.ref_name }} @ $SHORT_SHA"
            DESC="Repo: ${{ github.repository }} | Actor: ${{ github.actor }} | Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            PAYLOAD=$(jq -n --arg teamId "$TEAM_ID" --arg title "$TITLE" --arg desc "$DESC" \
              '{"query": "mutation($teamId:String!,$title:String!,$desc:String!){issueCreate(input:{teamId:$teamId,title:$title,description:$desc}){success issue{id url}}}", "variables": {"teamId": $teamId, "title": $title, "desc": $desc}}')
            curl -sf -X POST https://api.linear.app/graphql \
              -H "Authorization: $LINEAR_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD" && echo "Linear: Issue created OK" || echo "Linear: failed"
          else
            echo "No teams found in Linear workspace"
          fi

      - name: Log to Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_API_KEY }}
          NOTION_DB: ${{ secrets.NOTION_DB_ID }}
        run: |
          if [ -z "$NOTION_TOKEN" ] || [ -z "$NOTION_DB" ]; then
            echo "NOTION_API_KEY or NOTION_DB_ID not configured - skipping"
            echo "To enable: add NOTION_API_KEY and NOTION_DB_ID to repo secrets"
            exit 0
          fi
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          PAYLOAD=$(jq -n \
            --arg db "$NOTION_DB" \
            --arg name "[MOTHER-BRAIN] ${{ github.ref_name }} @ $SHORT_SHA" \
            --arg ts "$TS" \
            --arg url "$RUN_URL" \
            --arg repo "${{ github.repository }}" \
            '{
              "parent": {"database_id": $db},
              "properties": {
                "Name": {"title": [{"text": {"content": $name}}]},
                "Status": {"select": {"name": "Logged"}},
                "Timestamp": {"date": {"start": $ts}},
                "RunURL": {"url": $url},
                "Repo": {"rich_text": [{"text": {"content": $repo}}]}
              }
            }')
          curl -sf -X POST https://api.notion.com/v1/pages \
            -H "Authorization: Bearer $NOTION_TOKEN" \
            -H "Content-Type: application/json" \
            -H "Notion-Version: 2022-06-28" \
            -d "$PAYLOAD" && echo "Notion: Page created OK" || echo "Notion: failed"

      - name: Workflow Summary
        if: always()
        run: |
          echo "## Linear + Notion Logger" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Repo | ${{ github.repository }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Actor | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Time | $(date -u) |" >> $GITHUB_STEP_SUMMARY
