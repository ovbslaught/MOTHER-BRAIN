name: MOTHER-BRAIN Autonomous Sync & Automation

on:
  push:
    branches: ['**']
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

env:
  PYTHON_VERSION: '3.11'

jobs:
  autonomous-operations:
    runs-on: ubuntu-latest
    name: Autonomous System Operations

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python environment
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests google-auth google-auth-httplib2 google-api-python-client 2>/dev/null || true

      - name: Setup rclone credentials
        continue-on-error: true
        run: |
          curl https://rclone.org/install.sh | sudo bash
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf << 'RCLONE_EOF'
          [gdrive]
          type = drive
          scope = drive
          service_account_file = /tmp/gdrive-sa.json
          root_folder_id = 1VSH08EzxY0Knni5HKUaHePTliUAKxfWh
          RCLONE_EOF
          if [ -n "${{ secrets.GDRIVE_SA_B64 }}" ]; then
            echo '${{ secrets.GDRIVE_SA_B64 }}' | base64 -d > /tmp/gdrive-sa.json
          elif [ -n "${{ secrets.GDRIVE_SA_KEY }}" ]; then
            printf '%s' '${{ secrets.GDRIVE_SA_KEY }}' > /tmp/gdrive-sa.json
          else
            printf '%s' '${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}' > /tmp/gdrive-sa.json
          fi
          chmod 600 /tmp/gdrive-sa.json || true
          cat > /tmp/validate_key.py << 'PYEOF'
import json, sys
try:
    with open('/tmp/gdrive-sa.json', 'r') as f:
        data = json.load(f)
    pk = data.get('private_key', '')
    if pk and len(pk) > 100 and 'BEGIN' in pk:
        print('Key validation: PASSED')
    else:
        print('Key validation: FAILED - short or missing')
except Exception as e:
    print('Parse error:', str(e))
PYEOF
          python3 /tmp/validate_key.py || true

      - name: Sync from Google Drive
        continue-on-error: true
        id: drive_sync
        run: |
          SYNC_SUCCESS=0
          SYNC_FAIL=0
          for path in MOTHER-BRAIN NOMADZ-0 VULTURE agents scripts data; do
            echo "Syncing $path..."
            if rclone sync "gdrive:$path" "./$path" --checksum --exclude '.git/**' 2>&1; then
              SYNC_SUCCESS=$((SYNC_SUCCESS+1))
            else
              SYNC_FAIL=$((SYNC_FAIL+1))
            fi
          done
          echo "SYNC_SUCCESS=$SYNC_SUCCESS" >> $GITHUB_ENV
          echo "SYNC_FAIL=$SYNC_FAIL" >> $GITHUB_ENV

      - name: Log to Sheets
        continue-on-error: true
        if: always()
        run: |
          cat > /tmp/log_sheets.py << 'PYEOF'
import os, sys, json
try:
    from googleapiclient.discovery import build
    from google.oauth2.service_account import Credentials
    with open('/tmp/gdrive-sa.json', 'r') as f:
        sa_data = json.load(f)
    creds = Credentials.from_service_account_info(sa_data, scopes=['https://www.googleapis.com/auth/spreadsheets'])
    service = build('sheets', 'v4', credentials=creds)
    timestamp = os.environ.get('TIMESTAMP', '')
    sync_success = os.environ.get('SYNC_SUCCESS', '0')
    sync_fail = os.environ.get('SYNC_FAIL', '0')
    committed = os.environ.get('COMMITTED', 'false')
    branch = os.environ.get('GITHUB_REF_NAME', '')
    sha = os.environ.get('GITHUB_SHA', '')[:7]
    row = [f'sync-{timestamp}', 'MOTHER-BRAIN Autonomous Sync', f'OK:{sync_success} WARN:{sync_fail} Committed:{committed}', 'MOTHER-BRAIN', '', timestamp, 'GitHub Actions', f'{branch}@{sha}']
    body = {'values': [row]}
    result = service.spreadsheets().values().append(spreadsheetId='1Uw-ybevyQ2J-OEi1TbD3mh5AfUydnOLedhytAGp31qg', range='Table 1!A:H', valueInputOption='RAW', body=body).execute()
    print('Sheets appended:', result.get('updates', {}).get('updatedCells', 0), 'cells')
except Exception as e:
    print('Sheets error:', str(e))
    sys.exit(0)
PYEOF
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M:%S') python3 /tmp/log_sheets.py || true

      - name: Configure Git
        run: |
          git config user.name "MOTHER-BRAIN Bot"
          git config user.email "ovbslaught@gmail.com"

      - name: Commit and push changes
        run: |
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
            echo "COMMITTED=false" >> $GITHUB_ENV
          else
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
            git commit -m "Autonomous sync $TIMESTAMP"
            git push origin ${{ github.ref_name }}
            echo "COMMITTED=true" >> $GITHUB_ENV
          fi

      - name: Health check
        if: always()
        run: |
          echo "=== MOTHER-BRAIN Health Check ==="
          echo "Repo: ${{ github.repository }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Sync OK: ${SYNC_SUCCESS:-0}"
          echo "Sync WARN: ${SYNC_FAIL:-0}"

      - name: Cleanup
        if: always()
        run: rm -f /tmp/gdrive-sa.json /tmp/validate_key.py /tmp/log_sheets.py || true
