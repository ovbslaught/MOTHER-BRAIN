name: MOTHER-BRAIN Autonomous Sync & Automation
on:
  push:
    branches: ['**']
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:
permissions:
  contents: write
  actions: read
env:
  PYTHON_VERSION: '3.11'
jobs:
  autonomous-operations:
    runs-on: ubuntu-latest
    name: Autonomous System Operations
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Python environment
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests beautifulsoup4 google-auth google-auth-httplib2 google-api-python-client
      - name: Setup rclone for Drive sync
        continue-on-error: true
        run: |
          curl https://rclone.org/install.sh | sudo bash
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf << 'RCLONE_EOF'
          [gdrive]
          type = drive
          scope = drive
          service_account_file = /tmp/gdrive-sa.json
          root_folder_id = 1VSH08EzxY0Knni5HKUaHePTliUAKxfWh
          RCLONE_EOF
          # Try base64-encoded secret first (GDRIVE_SA_B64)
          if [ -n "${{ secrets.GDRIVE_SA_B64 }}" ]; then
            echo '${{ secrets.GDRIVE_SA_B64 }}' | base64 -d > /tmp/gdrive-sa.json
            echo "Used GDRIVE_SA_B64 (base64 decoded)"
          elif [ -n "${{ secrets.GDRIVE_SA_KEY }}" ]; then
            # GDRIVE_SA_KEY may be raw JSON or base64 - try both
            printf '%s' '${{ secrets.GDRIVE_SA_KEY }}' > /tmp/raw-key.txt
            if base64 -d /tmp/raw-key.txt > /tmp/sa-test.json 2>/dev/null && python3 -c "import json; json.load(open('/tmp/sa-test.json'))" 2>/dev/null; then
              echo "GDRIVE_SA_KEY was base64 encoded"
              cp /tmp/sa-test.json /tmp/gdrive-sa.json
            else
              echo "GDRIVE_SA_KEY is raw JSON"
              cp /tmp/raw-key.txt /tmp/gdrive-sa.json
            fi
          else
            printf '%s' '${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}' > /tmp/gdrive-sa.json
            echo "Used GDRIVE_SERVICE_ACCOUNT_JSON (raw)"
          fi
          chmod 600 /tmp/gdrive-sa.json
          # Normalize private_key newlines using Python
          python3 << 'PYEOF'
          import json, sys
          try:
              with open('/tmp/gdrive-sa.json', 'r') as f:
                  content = f.read()
              data = json.loads(content)
              pk = data.get('private_key', '')
              # Fix escaped newlines if present
              if '\\n' in pk and '\n' not in pk.replace('-----BEGIN', '').replace('-----END', ''):
                  pk = pk.replace('\\n', '\n')
                  data['private_key'] = pk
                  with open('/tmp/gdrive-sa.json', 'w') as f:
                      json.dump(data, f, indent=2)
                  print('Fixed escaped newlines in private_key')
              print('SA email:', data.get('client_email', 'MISSING'))
              print('Key length:', len(pk))
              if len(pk) < 100:
                  print('ERROR: private_key too short!')
                  sys.exit(1)
              print('Key validation: PASSED')
          except Exception as e:
              print('Key parse error:', e)
              sys.exit(1)
          PYEOF
      - name: Sync from Google Drive
        continue-on-error: true
        id: drive_sync
        run: |
          SYNC_LOG=""
          SYNC_SUCCESS=0
          SYNC_FAIL=0
          for path in MOTHER-BRAIN NOMADZ-0 VULTURE agents scripts data; do
            echo "Syncing $path..."
            if rclone sync "gdrive:$path" "./$path" --checksum --exclude '.git/**' 2>&1; then
              echo "SUCCESS: $path"
              SYNC_SUCCESS=$((SYNC_SUCCESS+1))
              SYNC_LOG="$SYNC_LOG\n- $path: OK"
            else
              echo "WARN: $path sync had issues (non-fatal)"
              SYNC_FAIL=$((SYNC_FAIL+1))
              SYNC_LOG="$SYNC_LOG\n- $path: WARN"
            fi
          done
          echo "SYNC_SUCCESS=$SYNC_SUCCESS" >> $GITHUB_ENV
          echo "SYNC_FAIL=$SYNC_FAIL" >> $GITHUB_ENV
          printf "SYNC_LOG<<EOF\n$SYNC_LOG\nEOF" >> $GITHUB_ENV
      - name: Configure Git
        run: |
          git config user.name "MOTHER-BRAIN Bot"
          git config user.email "ovbslaught@gmail.com"
      - name: Commit and push changes
        id: git_push
        run: |
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
            echo "COMMITTED=false" >> $GITHUB_ENV
          else
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
            git commit -m "Autonomous sync $TIMESTAMP"
            git push origin ${{ github.ref_name }}
            echo "COMMITTED=true" >> $GITHUB_ENV
            echo "COMMIT_TIME=$TIMESTAMP" >> $GITHUB_ENV
          fi
      - name: Log to Notion
        continue-on-error: true
        if: always()
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
        run: |
          if [ -z "$NOTION_API_KEY" ]; then
            echo "NOTION_API_KEY not set, skipping Notion log"
            exit 0
          fi
          TIMESTAMP=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
          STATUS="${{ job.status }}"
          PAYLOAD=$(cat << NOTIONEOF
          {
            "parent": {"database_id": "${{ secrets.NOTION_LOG_DB_ID }}"},
            "properties": {
              "Name": {"title": [{"text": {"content": "MOTHER-BRAIN Sync $TIMESTAMP"}}]},
              "Status": {"select": {"name": "$STATUS"}},
              "Branch": {"rich_text": [{"text": {"content": "${{ github.ref_name }}"}}]},
              "Commit": {"rich_text": [{"text": {"content": "${{ github.sha }}"}}]},
              "Synced": {"number": ${{ env.SYNC_SUCCESS || 0 }}},
              "Warnings": {"number": ${{ env.SYNC_FAIL || 0 }}},
              "Date": {"date": {"start": "$TIMESTAMP"}}
            }
          }
          NOTIONEOF
          )
          curl -s -X POST https://api.notion.com/v1/pages \
            -H "Authorization: Bearer $NOTION_API_KEY" \
            -H "Notion-Version: 2022-06-28" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" | python3 -c "import json,sys; r=json.load(sys.stdin); print('Notion:', r.get('id','ERROR:'+str(r)))"
      - name: Log to NOMADZ-0-WIKI
        continue-on-error: true
        if: always()
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
          DATE=$(date -u '+%Y-%m-%d')
          STATUS="${{ job.status }}"
          BRANCH="${{ github.ref_name }}"
          SHA="${{ github.sha }}"
          LOG_ENTRY="## MOTHER-BRAIN Sync Log - $TIMESTAMP\n\n**Status:** $STATUS \n**Branch:** $BRANCH \n**Commit:** $SHA \n**Drive paths synced:** ${{ env.SYNC_SUCCESS || 0 }} OK / ${{ env.SYNC_FAIL || 0 }} WARN \n**Changes committed:** ${{ env.COMMITTED || 'false' }}\n"
          API_RESP=$(curl -s -H "Authorization: token $GH_PAT" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/ovbslaught/NOMADZ-0-WIKI/contents/MOTHER-BRAIN-sync-log.md")
          CURRENT_SHA=$(echo "$API_RESP" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('sha',''))" 2>/dev/null || echo "")
          CURRENT_CONTENT=$(echo "$API_RESP" | python3 -c "import json,sys,base64; d=json.load(sys.stdin); print(base64.b64decode(d.get('content','')).decode())" 2>/dev/null || echo "")
          NEW_CONTENT=$(printf "# MOTHER-BRAIN Sync Logs\n\n$LOG_ENTRY\n---\n\n$CURRENT_CONTENT")
          ENCODED=$(printf '%s' "$NEW_CONTENT" | base64 -w 0)
          if [ -z "$CURRENT_SHA" ]; then
            curl -s -X PUT "https://api.github.com/repos/ovbslaught/NOMADZ-0-WIKI/contents/MOTHER-BRAIN-sync-log.md" \
              -H "Authorization: token $GH_PAT" \
              -H "Content-Type: application/json" \
              -d "{\"message\": \"Auto-log: MOTHER-BRAIN sync $DATE\", \"content\": \"$ENCODED\"}" \
              | python3 -c "import json,sys; r=json.load(sys.stdin); print('Wiki created:', r.get('content',{}).get('sha','ERROR'))"
          else
            curl -s -X PUT "https://api.github.com/repos/ovbslaught/NOMADZ-0-WIKI/contents/MOTHER-BRAIN-sync-log.md" \
              -H "Authorization: token $GH_PAT" \
              -H "Content-Type: application/json" \
              -d "{\"message\": \"Auto-log: MOTHER-BRAIN sync $DATE\", \"content\": \"$ENCODED\", \"sha\": \"$CURRENT_SHA\"}" \
              | python3 -c "import json,sys; r=json.load(sys.stdin); print('Wiki updated:', r.get('content',{}).get('sha','ERROR'))"
          fi

                - name: Log to OMEGA SPACE Sheets
        continue-on-error: true
        if: always()
        run: |
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M:%S')
          SPREADSHEET_ID="1Uw-ybevyQ2J-OEi1TbD3mh5AfUydnOLedhytAGp31qg"
          # Append sync log entry to "Table 1" sheet
          python3 << 'PYEOF'
import os, sys, json
from googleapiclient.discovery import build
from google.oauth2.service_account import Credentials

# Load SA key
try:
    with open('/tmp/gdrive-sa.json', 'r') as f:
        sa_data = json.load(f)
    creds = Credentials.from_service_account_info(sa_data, scopes=['https://www.googleapis.com/auth/spreadsheets'])
    service = build('sheets', 'v4', credentials=creds)
    
    spreadsheet_id = '1Uw-ybevyQ2J-OEi1TbD3mh5AfUydnOLedhytAGp31qg'
    timestamp = os.environ.get('TIMESTAMP', '')
    sync_success = os.environ.get('SYNC_SUCCESS', '0')
    sync_fail = os.environ.get('SYNC_FAIL', '0')
    commit_status = os.environ.get('COMMITTED', 'false')
    branch = os.environ.get('GITHUB_REF_NAME', '')
    sha = os.environ.get('GITHUB_SHA', '')[:7]
    
    # Table 1 row: File Name, Title, Description, Architecture Component, File Size, Created Date, Core Technology, Source
    row_data = [
        f'sync-{timestamp}',
        'MOTHER-BRAIN Autonomous Sync',
        f'Synced {sync_success} paths OK, {sync_fail} WARN. Committed: {commit_status}',
        'MOTHER-BRAIN',
        '',
        timestamp,
        'GitHub Actions',
        f'{branch}@{sha}'
    ]
    
    body = {'values': [row_data]}
    result = service.spreadsheets().values().append(
        spreadsheetId=spreadsheet_id,
        range='Table 1!A:H',
        valueInputOption='RAW',
        body=body
    ).execute()
    
    print(f'Sheets: Appended {result.get("updates").get("updatedCells")} cells')
except Exception as e:
    print('Sheets error:', e)
    sys.exit(0)
          PYEOF
      - name: Enhanced Notion Event Log
        continue-on-error: true
        if: always()
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
        run: |
          if [ -z "$NOTION_API_KEY" ]; then
            echo "NOTION_API_KEY not set"
            exit 0
          fi
          TIMESTAMP=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
          STATUS="${{ job.status }}"
          SEQ=$(date +%s)
          # Enhanced Event Log with proper schema
          PAYLOAD=$(cat << NOTIONEOF
          {
            "parent": {"database_id": "${{ secrets.NOTION_LOG_DB_ID }}"},
            "properties": {
              "Name": {"title": [{"text": {"content": "MOTHER-BRAIN Sync Event"}}]},
              "Summary": {"rich_text": [{"text": {"content": "Synced ${{ env.SYNC_SUCCESS || 0 }} paths, ${{ env.SYNC_FAIL || 0 }} warnings. Status: $STATUS"}}]},
              "EventType": {"select": {"name": "AutoSync"}},
              "Timestamp": {"date": {"start": "$TIMESTAMP"}},
              "Seq": {"number": $SEQ},
              "Space": {"rich_text": [{"text": {"content": "OMEGA-CORE-01"}}]},
              "Operator": {"rich_text": [{"text": {"content": "github-actions[bot]"}}]},
              "Data": {"rich_text": [{"text": {"content": "Branch: ${{ github.ref_name }}, Commit: ${{ github.sha }}"}}]}
            }
          }
          NOTIONEOF
          )
          curl -s -X POST https://api.notion.com/v1/pages \
            -H "Authorization: Bearer $NOTION_API_KEY" \
            -H "Notion-Version: 2022-06-28" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" | python3 -c "import json,sys; r=json.load(sys.stdin); print('Notion Event:', r.get('id','ERROR'))"
      - name: Crawl & Log Chats with Firecrawl
        continue-on-error: true
        run: |
          echo "Firecrawl chat scraping - placeholder for expansion"
          # TODO: Implement Firecrawl scraping of Grok/Mistral chat URLs from OMEGA SPACE sheets
          # - Read "Grok Chats" and "Mistral AI Chats" sheet tabs
          # - For each URL, use Firecrawl API to scrape content
          # - Append scraped markdown to appropriate Drive folder
          # - Log results back to sheets
      - name: Health check
        if: always()
        run: |
          echo "=== MOTHER-BRAIN Health Check ==="
          echo "Repo: ${{ github.repository }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Files: $(find . -not -path './.git/*' -type f | wc -l)"
          echo "Sync OK: ${{ env.SYNC_SUCCESS || 0 }}"
          echo "Sync WARN: ${{ env.SYNC_FAIL || 0 }}"
          echo "Changes committed: ${{ env.COMMITTED || 'false' }}"
      - name: Cleanup
        if: always()
        run: rm -f /tmp/gdrive-sa.json /tmp/raw-key.txt /tmp/sa-test.json
