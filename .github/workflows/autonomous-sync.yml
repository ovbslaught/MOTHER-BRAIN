name: MOTHER-BRAIN Autonomous Sync & Automation

on:
  push:
    branches: ['**']
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  autonomous-operations:
    runs-on: ubuntu-latest
    name: Autonomous System Operations

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests google-auth google-auth-httplib2 google-api-python-client 2>/dev/null || true

      - name: Setup rclone credentials
        continue-on-error: true
        run: |
          curl https://rclone.org/install.sh | sudo bash
          mkdir -p ~/.config/rclone
          printf '[gdrive]\ntype = drive\nscope = drive\nservice_account_file = /tmp/gdrive-sa.json\nroot_folder_id = 1VSH08EzxY0Knni5HKUaHePTliUAKxfWh\n' > ~/.config/rclone/rclone.conf
          if [ -n "${{ secrets.GDRIVE_SA_B64 }}" ]; then
            echo '${{ secrets.GDRIVE_SA_B64 }}' | base64 -d > /tmp/gdrive-sa.json
          elif [ -n "${{ secrets.GDRIVE_SA_KEY }}" ]; then
            printf '%s' '${{ secrets.GDRIVE_SA_KEY }}' > /tmp/gdrive-sa.json
          else
            printf '%s' '${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}' > /tmp/gdrive-sa.json
          fi
          chmod 600 /tmp/gdrive-sa.json || true
          echo "Credential file size: $(wc -c < /tmp/gdrive-sa.json) bytes"

      - name: Sync from Google Drive
        continue-on-error: true
        id: drive_sync
        run: |
          SYNC_SUCCESS=0
          SYNC_FAIL=0
          for path in MOTHER-BRAIN NOMADZ-0 VULTURE agents scripts data; do
            echo "Syncing $path..."
            if rclone sync "gdrive:$path" "./$path" --checksum --exclude '.git/**' 2>&1; then
              SYNC_SUCCESS=$((SYNC_SUCCESS+1))
            else
              SYNC_FAIL=$((SYNC_FAIL+1))
            fi
          done
          echo "SYNC_SUCCESS=$SYNC_SUCCESS" >> $GITHUB_ENV
          echo "SYNC_FAIL=$SYNC_FAIL" >> $GITHUB_ENV

      - name: Configure Git
        run: |
          git config user.name "MOTHER-BRAIN Bot"
          git config user.email "ovbslaught@gmail.com"

      - name: Commit and push changes
        run: |
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
            echo "COMMITTED=false" >> $GITHUB_ENV
          else
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
            git commit -m "Autonomous sync $TIMESTAMP"
            git push origin ${{ github.ref_name }}
            echo "COMMITTED=true" >> $GITHUB_ENV
          fi

      - name: Health check
        if: always()
        run: |
          echo "=== MOTHER-BRAIN Health Check ==="
          echo "Repo: ${{ github.repository }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Sync OK: ${SYNC_SUCCESS:-0}"
          echo "Sync WARN: ${SYNC_FAIL:-0}"
          echo "Committed: ${COMMITTED:-false}"

      - name: Cleanup
        if: always()
        run: rm -f /tmp/gdrive-sa.json || true
