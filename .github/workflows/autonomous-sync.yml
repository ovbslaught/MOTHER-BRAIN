name: MOTHER-BRAIN Autonomous Sync & Automation

on:
  push:
    branches: ['**']
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

env:
  PYTHON_VERSION: '3.11'

jobs:
  autonomous-operations:
    runs-on: ubuntu-latest
    name: Autonomous System Operations
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python environment
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests beautifulsoup4 google-auth google-auth-httplib2 google-api-python-client

      - name: Setup rclone for Drive sync
        continue-on-error: true
        run: |
          curl https://rclone.org/install.sh | sudo bash
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf << 'RCLONE_EOF'
          [gdrive]
          type = drive
          scope = drive
          service_account_file = /tmp/gdrive-sa.json
          root_folder_id = 1VSH08EzxY0Knni5HKUaHePTliUAKxfWh
          RCLONE_EOF
          echo '${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}' > /tmp/gdrive-sa.json
          chmod 600 /tmp/gdrive-sa.json

      - name: Sync from Google Drive
        continue-on-error: true
        run: |
          for path in MOTHER-BRAIN NOMADZ-0 VULTURE agents scripts data; do
            rclone sync "gdrive:$path" "./$path" --checksum --exclude '.git/**' || true
          done

      - name: Configure Git
        run: |
          git config user.name "MOTHER-BRAIN Bot"
          git config user.email "ovbslaught@gmail.com"

      - name: Commit and push changes
        run: |
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Autonomous sync $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push origin ${{ github.ref_name }}
          fi

      - name: Health check
        run: |
          echo "Repo: ${{ github.repository }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Files: $(find . -type f | wc -l)"

      - name: Cleanup
        if: always()
        run: rm -f /tmp/gdrive-sa.json
