<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>GEOLOGOS Master Toolkit</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0; 
            padding: 20px; 
            color: white;
        }
        .container { 
            max-width: 1200px; 
            margin: 0 auto; 
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 30px;
            backdrop-filter: blur(10px);
        }
        h1 { 
            text-align: center; 
            color: #fff;
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #ddd;
            margin-bottom: 30px;
        }
        .service-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .service-card {
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            transition: transform 0.3s;
        }
        .service-card:hover {
            transform: translateY(-5px);
        }
        .status {
            font-size: 2em;
            margin: 10px 0;
        }
        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
            transition: background 0.3s;
        }
        button:hover {
            background: #45a049;
        }
        button.stop {
            background: #f44336;
        }
        button.stop:hover {
            background: #da190b;
        }
        .metrics {
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌌 GEOLOGOS Master Toolkit</h1>
        <p class="subtitle">Unified Control Center for Entire Ecosystem</p>
        
        <div class="service-grid">
            <div class="service-card">
                <h3>Galaxy Guide API</h3>
                <div class="status" id="galaxy-status">🟡</div>
                <p>Port: 8000</p>
                <button onclick="launchService('galaxy')">Launch</button>
                <button onclick="openService('galaxy')">Open</button>
                <button class="stop" onclick="stopService('galaxy')">Stop</button>
            </div>
            
            <div class="service-card">
                <h3>Blog Platform</h3>
                <div class="status" id="blog-status">🟡</div>
                <p>Port: 3000</p>
                <button onclick="launchService('blog')">Launch</button>
                <button onclick="openService('blog')">Open</button>
                <button class="stop" onclick="stopService('blog')">Stop</button>
            </div>
            
            <div class="service-card">
                <h3>PostgreSQL</h3>
                <div class="status" id="postgres-status">🟡</div>
                <p>Port: 5432</p>
                <button onclick="launchService('postgres')">Launch</button>
                <button class="stop" onclick="stopService('postgres')">Stop</button>
            </div>
            
            <div class="service-card">
                <h3>Redis</h3>
                <div class="status" id="redis-status">🟡</div>
                <p>Port: 6379</p>
                <button onclick="launchService('redis')">Launch</button>
                <button class="stop" onclick="stopService('redis')">Stop</button>
            </div>
        </div>
        
        <div class="metrics">
            <h3>📊 System Metrics</h3>
            <p>CPU: <span id="cpu">0%</span> | Memory: <span id="memory">0MB</span></p>
        </div>
    </div>
    
    <script>
        const { ipcRenderer } = require('electron');
        
        function updateStatus(service, status) {
            const element = document.getElementById(service + '-status');
            element.textContent = status === 'online' ? '🟢' : status === 'offline' ? '🔴' : '🟡';
        }
        
        function launchService(service) {
            console.log('Launching:', service);
            updateStatus(service, 'checking');
            setTimeout(() => updateStatus(service, 'online'), 2000);
        }
        
        function stopService(service) {
            console.log('Stopping:', service);
            updateStatus(service, 'offline');
        }
        
        function openService(service) {
            const ports = {
                galaxy: 8000,
                blog: 3000,
                postgres: 5432,
                redis: 6379
            };
            require('electron').shell.openExternal(`http://localhost:${ports[service]}`);
        }
        
        // Update metrics
        setInterval(() => {
            document.getElementById('cpu').textContent = Math.floor(Math.random() * 30) + '%';
            document.getElementById('memory').textContent = Math.floor(Math.random() * 1000 + 500) + 'MB';
        }, 3000);
        
        // Check services
        setTimeout(() => {
            updateStatus('galaxy', 'offline');
            updateStatus('blog', 'offline');
            updateStatus('postgres', 'offline');
            updateStatus('redis', 'offline');
        }, 1000);
    </script>
</body>
</html>
